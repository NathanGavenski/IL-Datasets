name: PR Action

on:
  pull_request:
    branches:
      - main

env:
  SERVER: 1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup OpenGL
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-opengl mesa-utils xvfb

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pylint==2.17.5 pytest
          uv pip install -r ./requirements/dev.txt
          uv pip install -e ".[benchmark]"

      - name: Analysing the code with pylint
        run: |
          uv run pylint --fail-under=9 $(git ls-files '*.py') --ignore-paths=./tests/,./docs/

      - name: Unit testing
        run: |
          xvfb-run -s "-screen 0 1400x900x24" uv run pytest